# PostgreSQL only — API runs on the host (uvicorn) and connects via localhost:5432.
# From this directory: docker compose up -d
# Then: DATABASE_URL=postgresql+psycopg://futball:futball@127.0.0.1:5432/futball uvicorn app.main:app --reload
# Production image (Render, etc.): build Dockerfile separately — docker build -t futball-api .
#
# `name` avoids the folder name "backend" as the Compose project prefix.
# `container_name` fixes the Postgres container name (docker ps shows futball-postgres).

name: futball-manager

services:
  db:
    image: postgres:16-alpine
    container_name: futball-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-futball}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futball}
      POSTGRES_DB: ${POSTGRES_DB:-futball}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Defaults below must match POSTGRES_USER / POSTGRES_DB (or adjust this line).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futball -d futball"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
